{% extends 'base.html' %}
{% block title %}Explorador de Datos - MES Industrial{% endblock %}

{% block head %}
<link href="https://unpkg.com/tabulator-tables@6.2.1/dist/css/tabulator.min.css" rel="stylesheet">
<style>
    /* Tabulator Light Theme */
    .tabulator { background-color: var(--bg-surface) !important; border: 1px solid var(--border-color) !important; font-size: 13px !important; }
    .tabulator-header { background-color: var(--bg-surface) !important; color: var(--text-primary) !important; font-weight: 700 !important; border-bottom: 2px solid var(--border-color) !important; }
    .tabulator-header .tabulator-col { background-color: var(--bg-surface) !important; border-right: 1px solid var(--border-color) !important; }
    .tabulator-row { background-color: var(--bg-surface) !important; border-bottom: 1px solid var(--border-color) !important; color: var(--text-primary) !important; }
    .tabulator-row.tabulator-row-even { background-color: var(--bg-page) !important; }
    .tabulator-row:hover { background-color: var(--bg-surface-hover) !important; }
    .tabulator-footer { background-color: var(--bg-surface) !important; border-top: 1px solid var(--border-color) !important; color: var(--text-primary) !important; }
    .tabulator-col-content { padding: 8px !important; display: flex; flex-direction: column; justify-content: space-between; }
    .tabulator-header input { border: 1px solid var(--border-color) !important; padding: 4px 6px !important; border-radius: 4px !important; width: 100% !important; box-sizing: border-box !important; background-color: var(--bg-page) !important; color: var(--text-primary) !important; margin-top: 6px !important; }
    .tabulator-page { color: var(--text-secondary) !important; background-color: var(--bg-surface) !important; border: 1px solid var(--border-color) !important; }
    .tabulator-page.active { color: #ffffff !important; background-color: var(--accent-color) !important; border-color: var(--accent-color) !important; }
    /* Sidebar pill buttons */
    .table-pill { width: 100%; text-align: left; padding: 10px 12px; margin-bottom: 4px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.15s; background: transparent; color: var(--text-primary); }
    .table-pill:hover { background-color: var(--bg-surface-hover); }
    .table-pill.active { background-color: rgba(59,130,246,0.12); color: #3b82f6; font-weight: 600; }
</style>
{% endblock %}

{% block content %}
<div class="flex flex-col md:flex-row gap-4 md:gap-6 min-h-[calc(100vh-64px)] w-full p-4 sm:p-6">
    <!-- Sidebar: Catálogos de datos -->
    <div class="w-full md:w-60 shrink-0 flex flex-col mes-card rounded-xl">
        <div class="p-4 border-b" style="border-color: var(--border-color);">
            <h2 class="text-xs font-bold uppercase tracking-wider" style="color: var(--text-muted);">Catálogos de Datos</h2>
        </div>
        <div class="flex-1 overflow-y-auto p-2" id="table-selector"></div>
    </div>

    <!-- Panel principal -->
    <div class="flex-1 flex flex-col min-w-0 mes-card rounded-xl">
        <!-- Header -->
        <div class="p-4 flex justify-between items-center shrink-0" style="border-bottom: 1px solid var(--border-color);">
            <div>
                <h3 id="current-table-title" class="text-lg font-bold" style="color: var(--text-primary);">Seleccione una tabla</h3>
                <p id="current-table-desc" class="text-xs mt-0.5" style="color: var(--text-muted);">0 registros cargados</p>
            </div>
            <button id="download-csv" class="px-3 py-2 text-xs font-semibold rounded-lg flex items-center gap-2 opacity-40 cursor-not-allowed transition-all" style="background: var(--accent-color); color: #fff;" disabled>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Exportar CSV
            </button>
        </div>
        <!-- Tabla -->
        <div class="flex-1 relative p-2 min-h-0">
            <div id="loading-overlay" class="absolute inset-0 z-10 flex flex-col items-center justify-center hidden" style="background: var(--bg-overlay);">
                <svg class="animate-spin h-8 w-8 mb-2" style="color: var(--accent-color);" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-sm font-medium" style="color: var(--text-secondary);">Cargando datos...</span>
            </div>
            <div id="data-table" class="w-full" style="min-height: 400px;"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script type="text/javascript"
    src="https://unpkg.com/tabulator-tables@6.2.1/dist/js/tabulator.min.js"
    onload="onTabulatorReady()">
</script>
<script>
    function onTabulatorReady() {
        const tablesList = [
            { id: 'dim_operador',     name: 'Operadores',        desc: 'Directorio de Personal' },
            { id: 'dim_componente',   name: 'Componentes',       desc: 'Catálogo de Piezas' },
            { id: 'dim_estacion',     name: 'Estaciones',        desc: 'Máquinas y Áreas' },
            { id: 'dim_operacion',    name: 'Operaciones',       desc: 'Fases de Fabricación' },
            { id: 'dim_orden',        name: 'Órdenes',           desc: 'Pedidos de Producción' },
            { id: 'tabla_estandares', name: 'Estándares',        desc: 'Límites KPI Actuales' },
            { id: 'historicos_iqr',   name: 'Históricos IQR',    desc: 'Cálculos Estadísticos' },
            { id: 'fact_ejecuciones', name: 'Ejecuciones (Fact)',desc: 'Registros Operativos' }
        ];

        let table = null;
        let currentTableId = null;

        renderTableSelector();
        document.getElementById('download-csv').addEventListener('click', () => {
            if (table) table.download('csv', `${currentTableId}_export.csv`);
        });

        function renderTableSelector() {
            const container = document.getElementById('table-selector');
            tablesList.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'table-pill';
                btn.id = `btn-${t.id}`;
                btn.innerHTML = `<div class="font-semibold">${t.name}</div><div style="font-size:10px;color:var(--text-muted);margin-top:2px">${t.desc}</div>`;
                btn.addEventListener('click', () => loadTableData(t.id, t.name));
                container.appendChild(btn);
            });
        }

        function setActivePill(id) {
            tablesList.forEach(t => {
                const btn = document.getElementById(`btn-${t.id}`);
                if (btn) btn.classList.toggle('active', t.id === id);
            });
        }

        function loadTableData(tableId, tableName) {
            currentTableId = tableId;
            setActivePill(tableId);
            document.getElementById('current-table-title').innerText = tableName;
            document.getElementById('current-table-desc').innerText = 'Cargando...';
            document.getElementById('loading-overlay').classList.remove('hidden');
            const btnDownload = document.getElementById('download-csv');
            btnDownload.disabled = true;
            btnDownload.classList.add('opacity-40', 'cursor-not-allowed');

            fetch(`/api/explorar/${tableId}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    if (data.error) {
                        document.getElementById('current-table-desc').innerText = 'Error: ' + data.error;
                        return;
                    }
                    document.getElementById('current-table-desc').innerText = `${data.length} registros cargados`;
                    btnDownload.disabled = false;
                    btnDownload.classList.remove('opacity-40', 'cursor-not-allowed');
                    initTabulator(data);
                })
                .catch(err => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('current-table-desc').innerText = 'Error de conexión';
                    console.error('Error cargando tabla:', err);
                });
        }

        function customHeaderFilter(headerValue, rowValue) {
            if (!headerValue) return true;
            if (typeof rowValue === 'number') {
                const s = String(headerValue).trim();
                if (s.startsWith('>=')) return rowValue >= parseFloat(s.slice(2));
                if (s.startsWith('<=')) return rowValue <= parseFloat(s.slice(2));
                if (s.startsWith('>'))  return rowValue >  parseFloat(s.slice(1));
                if (s.startsWith('<'))  return rowValue <  parseFloat(s.slice(1));
                if (s.startsWith('='))  return rowValue === parseFloat(s.slice(1));
                return rowValue == parseFloat(s);
            }
            return String(rowValue).toLowerCase().includes(String(headerValue).toLowerCase());
        }

        function initTabulator(data) {
            if (table) table.destroy();
            table = new Tabulator('#data-table', {
                data: data,
                layout: 'fitColumns',
                pagination: 'local',
                paginationSize: 50,
                paginationSizeSelector: [25, 50, 100, 500, true],
                movableColumns: true,
                autoColumns: true,
                autoColumnsDefinitions: function(definitions) {
                    definitions.forEach(function(col) {
                        const sample = data.length > 0 ? data[0][col.field] : null;
                        const isNum = typeof sample === 'number' && !isNaN(sample);
                        col.headerFilter = 'input';
                        col.headerFilterFunc = customHeaderFilter;
                        col.titleFormatter = function(cell) {
                            return `<div style="white-space:normal;line-height:1.3">${cell.getValue()}</div>`;
                        };
                        if (isNum) col.hozAlign = 'right';
                    });
                    return definitions;
                }
            });
            table.on('tableBuilt', function() { setTimeout(() => table.redraw(true), 100); });
        }
    }
</script>
{% endblock %}
